apiVersion: batch/v1
kind: Job
metadata:
  name: rafood-migrations
  namespace: rafood
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/hook-skip-on-error: "true"
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrations
          image: rafood-api:latest
          imagePullPolicy: Never
          command: ["alembic", "upgrade", "head"]
