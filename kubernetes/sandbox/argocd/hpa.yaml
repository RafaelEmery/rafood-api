apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rafood-api
  namespace: rafood
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: rafood-api
  minReplicas: 3
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # Defines the average utilization of the CPU to trigger the scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70 # Defines the average utilization of the memory to trigger the scaling
