apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rafood-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RafaelEmery/rafood-api # Repository URL of the application
    # Target revision of the application.
    # It's highly recommended to use HEAD value to always deploy the latest version of the application
    # But in this case the manifest files are in a branch (PoC), so we need to specify it for now.
    # After feat/add-deployment branch is merged to main, we can change this value to HEAD
    # And feat/add-deployment may cause error on Argo CD UI because the branch is deleted.
    targetRevision: feat/add-deployment
    path: kubernetes/sandbox/argocd # Path to the application in the repository
  destination:
    server: https://kubernetes.default.svc
    namespace: rafood
  syncPolicy:
    automated:
      prune: true
      selfHeal: true # Self-heals the application if it's not in the desired state
    syncOptions:
      - CreateNamespace=true # Creates the namespace if it doesn't exist
